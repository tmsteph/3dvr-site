<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DVR Tech Homepage</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 80%;
            max-width: 600px;
            background-color: #111;
            padding: 20px;
            border-radius: 5px;
        }
        .header {
            font-size: 24px;
            color: #fff;
            margin-bottom: 20px;
        }
        .content {
            font-size: 16px;
            line-height: 1.6;
            color: #fff;
        }
        .footer {
            font-size: 14px;
            color: #fff;
            margin-top: 20px;
        }
        /* Add loading bar */
        .loading-bar {
            width: 100%;
            height: 5px;
            background-color: #ccc;
            position: absolute;
            bottom: 0;
            left: 0;
            transition: width 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            3DVR Tech Homepage
        </div>
        <div class="content">
            Welcome to 3DVR Tech, the leading provider of AI chips for the home. Our chips are designed to be powerful and efficient, and we offer a wide range of options for home use.
        </div>
        <div class="footer">
            Copyright &copy; 2021 3DVR Tech
        </div>
        <!-- Add loading bar -->
        <div class="loading-bar"></div>
    </div>
</body>


</html>
